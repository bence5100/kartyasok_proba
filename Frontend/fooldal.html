<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Mozi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">MOZI</div>
    <nav>
        <button class="btn-outline" onclick="openLogin()">Bejelentkezés</button>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Foglalj jegyet egyszerűen</h1>
        <p>Válaszd ki a filmed, időpontot és helyet pár kattintással.</p>
    </div>
</section>

<main class="content">
    <h2 class="section-title">Most futó filmek</h2>

    <div class="movies grid">
        <div class="movie card" onclick="openMovie('avatar')">
            <div class="card-body">
                <h3>Avatar 2</h3>
                <p>Sci-fi kaland</p>
            </div>
        </div>

        <div class="movie card" onclick="openMovie('oppenheimer')">
            <div class="card-body">
                <h3>Oppenheimer</h3>
                <p>Történelmi dráma</p>
            </div>
        </div>
    </div>
</main>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal" style="display:none;">
    <div class="modal-content">

        <div class="modal-header">
            <h2 id="modalTitle">Bejelentkezés</h2>
            <span class="close" onclick="closeLogin()">&times;</span>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="modal-form" onsubmit="login(event)">
            <input type="text" id="username" placeholder="Felhasználónév" required>
            <input type="password" id="password" placeholder="Jelszó" required>
            <button type="submit" class="btn-primary">Belépés</button>
            <button type="button" class="switch-btn" onclick="showRegister()">Nincs fiókod? Regisztráció</button>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="modal-form" style="display:none;" onsubmit="register(event)">
            <input type="text" placeholder="Név" required>
            <input type="email" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Jelszó" required>
            <input type="password" id="regPass2" placeholder="Jelszó újra" required>
            <button type="submit" class="btn-primary">Regisztráció</button>
            <button type="button" class="switch-btn" onclick="showLogin()">Van fiókod? Bejelentkezés</button>
        </form>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
